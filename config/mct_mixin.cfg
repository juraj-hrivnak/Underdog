# Configuration file

general {

    mixinsettings {
        # Enable debug logging for tile entity additions in the World mixin (Only works if enableWorldMixin is true) [Default=false]
        B:enableAdditionsLogging=false

        # Enable the MinecraftServer mixin to redirect error logging for crash debugging [Default=true]
        B:enableErrorLoggingRedirect=true

        # Enable debug logging for tile entity potentials in the World mixin (Only works if enableWorldMixin is true) [Default=true]
        B:enablePotentialsLogging=true

        # Enable the World mixin for tile entity additions (CME Fix) [Default=true]
        B:enableWorldMixin=true

        # Fix IE wire rendering for vertical/near-vertical wires and chunk-border cases [Default=true]
        B:fix_IE_wires=true

        # Replace IE conveyors with IT's optimized version. [Default=true]
        B:replace_IE_conveyors=true

        # Replace IE pipes with IT's own version. [Default=true]
        B:replace_IE_pipes=true
    }

}


