            D:alternator_threshold=0.0
        }

        advancedcokeoven {
            # This value gets added per baseheater, to the speed of the Advanced Coke Oven [Default=1]
            D:advancedCokeOven_baseheater_speed_increase=1.0

            # The speed of the Advanced Coke Oven gets multiplied by this value per baseheater [Default=1]
            D:advancedCokeOven_baseheater_speed_multiplier=1.0

            # How fast the Advanced Coke Oven (with no baseheaters) is when compared to the basic Coke Oven. A value of 1 means same speed. [Default=1]
            D:advancedCokeOven_speed_base=1.0

            # The capacity of the tank for the Advanced Coke Oven [Default=24000]
            I:advancedCokeOven_tankSize=24000
